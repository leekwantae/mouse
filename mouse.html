<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마우스 10회 연타 측정기</title>

<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

:root{
    --bg:#f6f7fb;
    --card:#ffffff;
    --text:#171717;
    --sub:#6b7280;
    --line:#e5e7eb;
    --main:#2563eb;
    --main-dark:#1d4ed8;
    --danger:#ef4444;
    --success:#16a34a;
    --soft:#eef4ff;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    background:linear-gradient(180deg,#ffffff 0%, var(--bg) 100%);
    font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif;
    color:var(--text);
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:36px 16px;
}

.app{
    width:100%;
    max-width:980px;
}

.header{
    text-align:center;
    margin-bottom:22px;
}

.header h1{
    margin:0;
    font-size:34px;
    font-weight:800;
    letter-spacing:-0.04em;
}

.header p{
    margin:10px 0 0;
    color:var(--sub);
    font-size:17px;
}

.card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:28px;
    box-shadow:0 20px 45px rgba(15,23,42,0.08);
    padding:28px;
}

.top{
    display:grid;
    grid-template-columns:1fr 1.1fr;
    gap:24px;
}

.counterBox{
    background:var(--soft);
    border-radius:24px;
    padding:30px 24px;
    text-align:center;
    border:1px solid #dbeafe;
}

#count{
    font-size:88px;
    font-weight:900;
    line-height:1;
    letter-spacing:-0.06em;
    color:#111827;
}

#status{
    margin-top:14px;
    font-size:18px;
    color:var(--sub);
    font-weight:600;
}

.buttonArea{
    display:flex;
    gap:12px;
    justify-content:center;
    margin-top:26px;
    flex-wrap:wrap;
}

button{
    border:none;
    cursor:pointer;
    font-family:inherit;
    font-weight:800;
    transition:transform .08s ease, box-shadow .18s ease, background .18s ease;
}

button:active{
    transform:scale(0.97);
}

#clickBtn{
    font-size:30px;
    padding:24px 58px;
    border-radius:999px;
    background:var(--main);
    color:white;
    box-shadow:0 12px 24px rgba(37,99,235,0.28);
}

#clickBtn:hover{
    background:var(--main-dark);
}

#clickBtn.done{
    background:var(--success);
    box-shadow:0 12px 24px rgba(22,163,74,0.25);
}

#resetBtn{
    font-size:20px;
    padding:20px 30px;
    border-radius:999px;
    background:#fff;
    color:var(--danger);
    border:1px solid #fecaca;
}

#resetBtn:hover{
    background:#fff1f2;
}

.stats{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
}

.stat{
    border:1px solid var(--line);
    border-radius:20px;
    padding:22px;
    background:#fff;
}

.stat.full{
    grid-column:1 / 3;
}

.label{
    font-size:15px;
    color:var(--sub);
    font-weight:700;
    margin-bottom:8px;
}

.value{
    font-size:34px;
    font-weight:900;
    letter-spacing:-0.04em;
}

.value small{
    font-size:18px;
    color:var(--sub);
    font-weight:700;
}

.tableCard{
    margin-top:22px;
    overflow:hidden;
    border:1px solid var(--line);
    border-radius:22px;
    background:white;
}

.tableTitle{
    padding:18px 22px;
    font-size:19px;
    font-weight:900;
    border-bottom:1px solid var(--line);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.tableTitle span{
    color:var(--sub);
    font-size:14px;
    font-weight:700;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#f9fafb;
    color:#4b5563;
    font-size:15px;
    padding:14px;
    border-bottom:1px solid var(--line);
}

td{
    padding:14px;
    text-align:center;
    border-bottom:1px solid #f1f5f9;
    font-size:20px;
    font-weight:700;
}

tr:last-child td{
    border-bottom:none;
}

.empty{
    color:#9ca3af;
    font-size:17px;
    font-weight:600;
}

.badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:56px;
    padding:7px 12px;
    border-radius:999px;
    background:#f3f4f6;
    color:#111827;
    font-size:16px;
    font-weight:800;
}

.fast{
    color:var(--success);
}

.guide{
    margin-top:16px;
    color:var(--sub);
    font-size:15px;
    text-align:center;
    line-height:1.6;
}

@media(max-width:760px){
    .top{
        grid-template-columns:1fr;
    }
    #count{
        font-size:70px;
    }
    .header h1{
        font-size:28px;
    }
    .card{
        padding:20px;
    }
    #clickBtn{
        width:100%;
    }
    #resetBtn{
        width:100%;
    }
}
</style>
</head>

<body>

<div class="app">
    <div class="header">
        <h1>마우스 10회 연타 측정기</h1>
        <p>10번 클릭하면 기록이 유지되고, 다음 클릭부터 새 세트가 시작됩니다.</p>
    </div>

    <div class="card">
        <div class="top">
            <div class="counterBox">
                <div id="count">0 / 10</div>
                <div id="status">첫 클릭을 누르면 측정이 시작됩니다.</div>

                <div class="buttonArea">
                    <button id="clickBtn">클릭!</button>
                    <button id="resetBtn">리셋</button>
                </div>
            </div>

            <div class="stats">
                <div class="stat">
                    <div class="label">직전 간격</div>
                    <div class="value"><span id="last">-</span> <small>ms</small></div>
                </div>

                <div class="stat">
                    <div class="label">최고 기록</div>
                    <div class="value fast"><span id="best">-</span> <small>ms</small></div>
                </div>

                <div class="stat full">
                    <div class="label">평균 간격</div>
                    <div class="value"><span id="avg">-</span> <small>ms</small></div>
                </div>
            </div>
        </div>

        <div class="tableCard">
            <div class="tableTitle">
                클릭 간격 기록
                <span>현재 세트만 표시</span>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>순번</th>
                        <th>간격 시간</th>
                        <th>상태</th>
                    </tr>
                </thead>
                <tbody id="list">
                    <tr>
                        <td colspan="3" class="empty">아직 기록이 없습니다.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="guide">
            1번째 클릭은 시작점이라 START로 표시됩니다. 2~10번째 클릭은 바로 전 클릭과의 간격이 ms 단위로 기록됩니다.
        </div>
    </div>
</div>

<script>
let count = 0;
let lastTime = null;
let intervals = [];
let finished = false;

const countEl = document.getElementById("count");
const statusEl = document.getElementById("status");
const lastEl = document.getElementById("last");
const avgEl = document.getElementById("avg");
const bestEl = document.getElementById("best");
const listEl = document.getElementById("list");
const clickBtn = document.getElementById("clickBtn");
const resetBtn = document.getElementById("resetBtn");

function resetForNewSet(){
    count = 0;
    lastTime = null;
    intervals = [];
    finished = false;

    countEl.textContent = "0 / 10";
    statusEl.textContent = "첫 클릭을 누르면 측정이 시작됩니다.";
    lastEl.textContent = "-";
    avgEl.textContent = "-";
    bestEl.textContent = "-";
    clickBtn.textContent = "클릭!";
    clickBtn.classList.remove("done");

    listEl.innerHTML = `
        <tr>
            <td colspan="3" class="empty">아직 기록이 없습니다.</td>
        </tr>
    `;
}

function clearTableForStart(){
    listEl.innerHTML = "";
}

function updateStats(interval){
    intervals.push(interval);

    const sum = intervals.reduce((a, b) => a + b, 0);
    const avg = sum / intervals.length;
    const best = Math.min(...intervals);

    lastEl.textContent = interval.toFixed(2);
    avgEl.textContent = avg.toFixed(2);
    bestEl.textContent = best.toFixed(2);
}

function addRow(number, intervalText, stateText){
    const tr = document.createElement("tr");
    tr.innerHTML = `
        <td><span class="badge">${number}</span></td>
        <td>${intervalText}</td>
        <td>${stateText}</td>
    `;
    listEl.appendChild(tr);
}

clickBtn.addEventListener("click", () => {
    if(finished){
        resetForNewSet();
    }

    const now = performance.now();

    count++;

    if(count === 1){
        clearTableForStart();
        addRow(1, "START", "측정 시작");
        statusEl.textContent = "측정 중입니다. 10번까지 클릭하세요.";
    }else{
        const interval = now - lastTime;
        updateStats(interval);
        addRow(count, interval.toFixed(2) + " ms", "기록 완료");
    }

    countEl.textContent = count + " / 10";
    lastTime = now;

    if(count >= 10){
        finished = true;
        statusEl.textContent = "10회 측정 완료! 기록을 확인하세요. 다음 클릭 시 새 세트가 시작됩니다.";
        clickBtn.textContent = "새 세트 시작";
        clickBtn.classList.add("done");
    }
});

resetBtn.addEventListener("click", resetForNewSet);
</script>

</body>
</html>

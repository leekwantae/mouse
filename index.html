<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Cony Tool</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f7fb;
}

.container{
    max-width:900px;
    margin:60px auto;
}

h1{
    text-align:center;
    font-size:42px;
    margin-bottom:50px;
}

.card{
    background:white;
    border-radius:20px;
    padding:30px;
    margin-bottom:25px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
    transition:.2s;
    cursor:pointer;
}

.card:hover{
    transform:translateY(-5px);
}

.title{
    font-size:28px;
    font-weight:bold;
}

.desc{
    color:#666;
    margin-top:10px;
}

a{
    text-decoration:none;
    color:inherit;
}
</style>

</head>

<body>

<div class="container">

<h1>🎯 Cony Tool</h1>

<a href="mouse.html">
<div class="card">
<div class="title">🖱️ 마우스 연타 측정기</div>
<div class="desc">
10회 클릭 간격 측정 및 평균/최고 기록
</div>
</div>
</a>

<a href="ticket.html">
<div class="card">
<div class="title">⚡ 티켓팅 연습기</div>
<div class="desc">
예약 버튼 활성화, 정각 클릭 연습
</div>
</div>
</a>

</div>

</body>
</html>
